name: Question
description: Make sure you take a look at the closed issues and docs before opening a new one.
title: "[Question] "
labels:
  - question

body:
  - type: input
    id: library
    attributes:
      label: Release version
      placeholder: e.g. APIOps Toolkit for Azure APIM v6.0.1
    validations:
      required: false
  - type: textarea
    id: background
    attributes:
      label: Question Details
      description: Please describe your question in as much detail as possible.
      placeholder: |
        What are you trying to do?
        What have you already tried?
        Are there any error messages or unexpected output?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment / Context
      description: Any relevant details about your setup (e.g. APIM tier, pipeline type, OS).
      placeholder: e.g. APIM Premium tier, GitHub Actions, Ubuntu runner
    validations:
      required: false
